<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JORAKAY EXPERT PAVILION</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            --jrk-forest: #162b14;     /* Deep Forest Green */
            --jrk-emerald: #2E7D32;    /* Primary Branding Green */
            --jrk-button: #2D6A30;     /* Submit Button Green */
            --jrk-mint: #4CAF50;       /* Follow Button Green */
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; overflow: hidden; }
        
        /* Main Pavilion Viewer */
        model-viewer { 
            width: 100%; height: 100%; display: block; 
            background: radial-gradient(circle, #ffffff 0%, #f2f2f2 100%); 
        }

        /* Bottom Control Panel */
        .ui-panel {
            position: absolute; bottom: calc(40px + env(safe-area-inset-bottom));
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 18px; border-radius: 30px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); width: 360px; max-width: 90vw; text-align: center; 
            z-index: 1000; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .button-group { display: flex; gap: 6px; margin-bottom: 12px; justify-content: center; }
        .mode-btn {
            background: #eee; border: none; padding: 12px 8px; border-radius: 15px;
            font-size: 10px; font-weight: 800; cursor: pointer; color: #666; flex: 1; transition: 0.3s;
        }
        .mode-btn.active { background: var(--jrk-forest); color: white; }

        #quiz-trigger {
            width: 100%; background: var(--jrk-emerald); color: white; border: none; padding: 16px;
            border-radius: 20px; font-weight: 800; font-size: 13px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.2);
        }

        /* Modal Base - Scrollable for Mobile */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 2000; overflow-y: auto; 
            -webkit-overflow-scrolling: touch; padding: 40px 0;
        }

        .modal-content { 
            background: #ffffff; border-radius: 40px; width: 92%; max-width: 850px; 
            margin: auto; display: flex; flex-direction: row; overflow: hidden;
            position: relative; box-shadow: 0 40px 120px rgba(0,0,0,0.6);
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @media (max-width: 750px) { .modal-content { flex-direction: column; max-width: 450px; } }

        @keyframes popUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* PULSE ANIMATION FOR PRIZE */
        @keyframes pulsePrize { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #aaa; z-index: 100; transition: 0.3s; }
        .close-btn:hover { color: var(--jrk-mint); }

        /* LEFT SIDE: Pure White Gallery Side */
        .modal-left { 
            flex: 1.2; background: #ffffff !important;
            display: flex; justify-content: center; align-items: center; padding: 50px;
            box-sizing: border-box; 
        }
        .modal-left img { 
            width: 100%; max-width: 400px; 
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.12)); 
            animation: pulsePrize 3s infinite ease-in-out;
        }

        /* RIGHT SIDE: Deep Green Info/Form Side */
        .modal-right { 
            flex: 1; padding: 60px 45px; background: var(--jrk-forest); color: #ffffff;
            display: flex; flex-direction: column; justify-content: center; position: relative;
        }

        /* Success Message Styling */
        #success-state { display: none; text-align: center; animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .modal-right h2 { color: #fff; font-size: 28px; font-weight: 900; margin: 0 0 10px 0; line-height: 1.1; }
        .modal-right p { font-size: 14px; color: #a5ba9e; line-height: 1.6; margin-bottom: 25px; }
        
        input { 
            width: 100%; padding: 16px; margin: 8px 0; border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 16px; background: rgba(255,255,255,0.05); color: white; font-size: 16px; outline: none; 
        }
        input::placeholder { color: #5a7058; }

        #submit-btn, .ig-button { 
            width: 100%; background: var(--jrk-button); color: white; border: none; 
            padding: 18px; border-radius: 16px; font-weight: 800; font-size: 15px; 
            margin-top: 15px; cursor: pointer; text-decoration: none; display: inline-block; text-align: center;
        }
        .ig-button { background: var(--jrk-mint); box-shadow: 0 10px 25px rgba(76, 175, 80, 0.3); }

        /* --- AFTER LIFE GALLERY STYLES --- */
        #afterlife-viewer { width: 100%; height: 450px; background: #fff; }
        .gallery-container { position: relative; flex: 1.2; background: #fff; display: flex; flex-direction: column; }
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.05); border: none; width: 50px; height: 50px; border-radius: 25px; cursor: pointer; font-size: 20px; z-index: 10; display: flex; align-items: center; justify-content: center; }
        #prev-btn { left: 20px; }
        #next-btn { right: 20px; }
