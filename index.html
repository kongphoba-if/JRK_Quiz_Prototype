<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JRK Sculpture | Quiz Challenge</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; overflow: hidden; }
        
        model-viewer { 
            width: 100vw; height: 100vh; display: block; 
            background: radial-gradient(circle, #ffffff 0%, #f0f0f0 100%);
        }

        /* Entry Button */
        #quiz-trigger {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #FF6B00; color: white; border: none; padding: 18px 36px;
            border-radius: 40px; font-weight: 800; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.4); z-index: 1000; 
            transition: transform 0.2s ease;
        }
        #quiz-trigger:active { transform: translateX(-50%) scale(0.95); }

        /* Modal Overlay */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }

        /* Quiz Card */
        .modal-content {
            background: white; padding: 35px; border-radius: 30px; width: 88%; max-width: 420px;
            text-align: center; position: relative; box-shadow: 0 25px 70px rgba(0,0,0,0.4);
        }

        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #ccc; }

        input {
            width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee;
            border-radius: 14px; box-sizing: border-box; font-size: 16px; 
            background: #fcfcfc; outline-color: #FF6B00;
        }

        #submit-btn {
            width: 100%; background: #FF6B00; color: white; border: none;
            padding: 18px; border-radius: 14px; font-weight: 800; font-size: 16px;
            margin-top: 15px; cursor: pointer;
        }

        #success-msg { display: none; color: #2ecc71; font-weight: 700; margin-top: 20px; }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="assembly.glb" ar ar-modes="webxr scene-viewer quick-look" 
                  camera-controls camera-orbit="auto auto 150%" max-camera-orbit="auto auto 400%"
                  environment-image="legacy" exposure="1.2" shadow-intensity="2" shadow-softness="0.5">
        
        <button id="quiz-trigger">🎁 WIN A REWARD</button>

        <div id="quiz-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="close-modal">&times;</span>
                <h2 style="color: #FF6B00; margin: 0 0 8px 0;">How Many Parts?</h2>
                <p style="font-size: 15px; color: #777; margin-bottom: 25px;">
                    Guess the total number of individual parts in this sculpture for a chance to win!
                </p>
                
                <form id="quiz-form">
                    <input type="number" name="guess" placeholder="Your Guess (e.g. 25)" required>
                    <input type="text" name="name" placeholder="Full Name" required>
                    <input type="tel" name="phone" placeholder="Phone Number" required>
                    <input type="email" name="email" placeholder="Email Address" required>
                    <button type="submit" id="submit-btn">SUBMIT ENTRY</button>
                </form>

                <div id="success-msg">
                    🎉 Entry Received!<br>
                    <span style="font-weight: 400; font-size: 14px; color: #666;">We will contact you if you win.</span>
                </div>
            </div>
        </div>
    </model-viewer>

    <script>
        const viewer = document.getElementById('viewer');
        const modal = document.getElementById('quiz-modal');
        const trigger = document.getElementById('quiz-trigger');
        const closeBtn = document.getElementById('close-modal');
        const form = document.getElementById('quiz-form');

        // Modal Controls
        trigger.onclick = () => modal.style.display = 'flex';
        closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; }

        // Quiz Submission
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "SENDING...";
            btn.disabled = true;

            const scriptURL = 'https://script.google.com/macros/s/AKfycbxQYJOzlaJfVQjO9BDEVli7gsEwxlc2BOU3SVloMzygtlwXfqSf1h6bQi6218ox5lSh/exec';
            const data = new FormData(form);

            try {
                await fetch(scriptURL, { method: 'POST', body: data, mode: 'no-cors' });
                form.style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
                setTimeout(() => { 
                    modal.style.display = 'none'; 
                    form.style.display = 'block';
                    document.getElementById('success-msg').style.display = 'none';
                    form.reset();
                    btn.innerText = "SUBMIT ENTRY";
                    btn.disabled = false;
                }, 3500);
            } catch (error) {
                alert("Error submitting. Please try again.");
                btn.innerText = "SUBMIT ENTRY";
                btn.disabled = false;
            }
        };

        // THE FIX: Forcing Vertex Colors to be visible
        viewer.addEventListener('load', () => {
            const materials = viewer.model.materials;
            materials.forEach(mat => {
                // Force Material to White so Vertex Colors multiply correctly (1 * Color = Color)
                mat.pbrMetallicRoughness.setBaseColorFactor([1, 1, 1, 1]);
                
                // Polish settings
                mat.pbrMetallicRoughness.setRoughnessFactor(0.5);
                mat.pbrMetallicRoughness.setMetallicFactor(0.1);
            });
        });
    </script>
</body>
</html>
