<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JORAKAY EXPERT PAVILION | Challenge</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        /* 1. Fix Body & Viewport */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, system-ui, sans-serif; background: #fff; }
        
        model-viewer { 
            width: 100%; height: 100%; display: block; 
            background: radial-gradient(circle, #ffffff 0%, #f0f0f0 100%); 
        }

        /* 2. Floating UI Panel - Lifted for Mobile Navigation */
        .ui-panel {
            position: absolute; 
            bottom: calc(50px + env(safe-area-inset-bottom)); /* Lifted for gesture nav */
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 30px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); width: 340px; max-width: 85vw; text-align: center; 
            z-index: 1000; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .button-group { display: flex; gap: 8px; margin-bottom: 12px; justify-content: center; }
        .mode-btn {
            background: #eee; border: none; padding: 12px; border-radius: 18px;
            font-size: 11px; font-weight: 800; cursor: pointer; color: #666; flex: 1;
        }
        .mode-btn.active { background: #000; color: white; }

        #quiz-trigger {
            width: 100%; background: #FF6B00; color: white; border: none; padding: 16px;
            border-radius: 20px; font-weight: 800; font-size: 14px; cursor: pointer;
        }

        /* 3. Modal Overlay - Allow Scrolling */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 2000; 
            overflow-y: auto; /* ALLOWS SCROLLING ON TALL FORMS */
            -webkit-overflow-scrolling: touch;
            padding: 20px 0; /* Space at top/bottom for mobile */
        }

        /* Modal Card - Responsive Height */
        .modal-content { 
            background: white; border-radius: 40px; width: 92%; max-width: 850px; 
            margin: auto; /* Centers the card when scrolling is active */
            display: flex; flex-direction: row; overflow: hidden;
            position: relative; box-shadow: 0 30px 100px rgba(0,0,0,0.5);
        }

        /* Mobile Layout Adjustments */
        @media (max-width: 750px) {
            .modal-content { flex-direction: column; max-width: 450px; width: 90%; }
            .modal-left { padding: 30px 20px !important; }
            .modal-right { padding: 30px 20px !important; text-align: center !important; }
        }

        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #333; z-index: 10; opacity: 0.5; }

        /* Left Panel - Forced White */
        .modal-left { 
            flex: 1.2; background: #ffffff; /* BOTH SIDES NOW WHITE */
            display: flex; justify-content: center; align-items: center; padding: 40px;
            box-sizing: border-box; 
        }
        
        .modal-left img {
            width: 100%; max-width: 320px; height: auto;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.1));
        }

        /* Right Panel - Forced White */
        .modal-right { 
            flex: 1; padding: 50px 40px; box-sizing: border-box; text-align: left;
            display: flex; flex-direction: column; justify-content: center;
            background: #ffffff; border-left: 1px solid #f0f0f0;
        }
        
        input { 
            width: 100%; padding: 16px; margin: 10px 0; border: 1px solid #eee; 
            border-radius: 16px; box-sizing: border-box; background: #fcfcfc; 
            font-size: 16px; -webkit-appearance: none; /* Prevents iOS zoom */
        }
        
        #submit-btn { 
            width: 100%; background: #FF6B00; color: white; border: none; 
            padding: 18px; border-radius: 16px; font-weight: 800; font-size: 16px; 
            margin-top: 15px; cursor: pointer;
        }

        /* Visual Fix for Mobile Keyboard */
        @media (max-height: 600px) {
            .modal-content { margin-top: 10px; margin-bottom: 100px; }
        }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="simple.glb" ar ar-modes="webxr scene-viewer quick-look" 
                  camera-controls camera-orbit="auto auto 150%" 
                  environment-image="legacy" exposure="1.2" shadow-intensity="2">
        
        <div class="ui-panel">
            <div class="button-group">
                <button id="btn-simple" class="mode-btn active">SIMPLIFIED</button>
                <button id="btn-detail" class="mode-btn">DETAILED</button>
            </div>
            <button id="quiz-trigger">🎁 THE PAVILION CHALLENGE</button>
        </div>

        <div id="quiz-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="close-modal">&times;</span>
                
                <div class="modal-left">
                    <img src="prize.png" alt="JORAKAY Prize Model">
                </div>

                <div class="modal-right">
                    <h2 style="color: #FF6B00; margin: 0 0 10px 0; font-size: 28px; font-weight: 900; line-height: 1.1;">
                        WIN THIS PRIZE!
                    </h2>
                    <p style="font-size: 15px; color: #555; margin: 0 0 25px 0; line-height: 1.6;">
                        Spot exactly how many modular pieces create the <b>JORAKAY EXPERT PAVILION</b>! Submit your closest guess now.
                        <br><br>
                        Closest <b>3</b> answers win limited edition 3D-printed modular models of <b>JORAKAY</b>!
                    </p>
                    <form id="quiz-form">
                        <input type="number" name="guess" placeholder="Your Guess (e.g. 142)" required>
                        <input type="text" name="name" placeholder="Full Name" required>
                        <input type="tel" name="phone" placeholder="Phone Number" required>
                        <input type="email" name="email" placeholder="Email Address" required>
                        <button type="submit" id="submit-btn">SUBMIT ENTRY</button>
                    </form>
                </div>
            </div>
        </div>
    </model-viewer>

    <script>
        const viewer = document.getElementById('viewer');
        const btnSimple = document.getElementById('btn-simple');
        const btnDetail = document.getElementById('btn-detail');
        const modal = document.getElementById('quiz-modal');

        function switchModel(mode) {
            btnSimple.classList.toggle('active', mode === 'simple');
            btnDetail.classList.toggle('active', mode === 'detail');
            const newSrc = mode === 'simple' ? 'simple.glb' : 'detail.glb';
            if (viewer.src !== newSrc) { viewer.src = newSrc; }
        }

        btnSimple.onclick = () => switchModel('simple');
        btnDetail.onclick = () => switchModel('detail');

        viewer.addEventListener('load', () => {
            viewer.model.materials.forEach(m => {
                m.pbrMetallicRoughness.setBaseColorFactor([1, 1, 1, 1]);
                m.pbrMetallicRoughness.setRoughnessFactor(0.5);
            });
        });

        // Modal Logic
        document.getElementById('quiz-trigger').onclick = () => {
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Lock background
        };
        
        const closeLogic = () => {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto'; // Unlock background
        };

        document.getElementById('close-modal').onclick = closeLogic;
        window.onclick = (e) => { if (e.target == modal) closeLogic(); }

        document.getElementById('quiz-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "SENDING...";
            const scriptURL = 'https://script.google.com/macros/s/AKfycbxQYJOzlaJfVQjO9BDEVli7gsEwxlc2BOU3SVloMzygtlwXfqSf1h6bQi6218ox5lSh/exec';
            try {
                await fetch(scriptURL, { method: 'POST', body: new FormData(e.target), mode: 'no-cors' });
                alert("Boom! Entry received.");
                closeLogic();
                e.target.reset();
            } catch (err) { alert("Error."); }
            btn.innerText = "SUBMIT ENTRY";
        };
    </script>
</body>
</html>
