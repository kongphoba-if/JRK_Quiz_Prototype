<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JORAKAY EXPERT PAVILION</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            --jrk-green: #2E7D32;      /* Primary Emerald */
            --jrk-dark: #1A3317;       /* Deep Forest */
            --jrk-light: #F1F8F1;      /* Mint Tint */
            --jrk-accent: #4CAF50;     /* Vibrant Leaf */
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; }
        
        model-viewer { 
            width: 100%; height: 100%; display: block; 
            background: radial-gradient(circle, #ffffff 0%, #e8eee8 100%); 
        }

        /* UI Panel - Lifted for Mobile Gesture Nav */
        .ui-panel {
            position: absolute; 
            bottom: calc(40px + env(safe-area-inset-bottom));
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 30px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); width: 340px; max-width: 85vw; text-align: center; 
            z-index: 1000; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .button-group { display: flex; gap: 8px; margin-bottom: 12px; justify-content: center; }
        .mode-btn {
            background: #eee; border: none; padding: 12px; border-radius: 18px;
            font-size: 11px; font-weight: 800; cursor: pointer; color: #666; flex: 1; transition: 0.3s;
        }
        .mode-btn.active { background: var(--jrk-dark); color: white; }

        #quiz-trigger {
            width: 100%; background: var(--jrk-green); color: white; border: none; padding: 16px;
            border-radius: 20px; font-weight: 800; font-size: 14px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3); transition: 0.3s;
        }
        #quiz-trigger:hover { background: var(--jrk-dark); }

        /* Modal Overlay - Scrollable for Mobile */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 2000; 
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 40px 0;
        }

        /* Modal Content Card */
        .modal-content { 
            background: white; border-radius: 40px; width: 92%; max-width: 850px; 
            margin: auto; display: flex; flex-direction: row; overflow: hidden;
            position: relative; box-shadow: 0 40px 120px rgba(0,0,0,0.6);
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @media (max-width: 750px) {
            .modal-content { flex-direction: column; max-width: 450px; }
            .modal-right { padding: 40px 25px !important; }
            .modal-left { padding: 40px 20px !important; }
        }

        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #999; z-index: 10; transition: 0.3s; }
        .close-btn:hover { color: var(--jrk-green); }

        /* LEFT SIDE: Pure White Prize Side */
        .modal-left { 
            flex: 1.2; background: #ffffff;
            display: flex; justify-content: center; align-items: center; padding: 50px;
            box-sizing: border-box; 
        }
        
        .modal-left img {
            width: 100%; max-width: 380px; height: auto;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.12));
        }

        /* RIGHT SIDE: Darker Form Side */
        .modal-right { 
            flex: 1; padding: 60px 45px; box-sizing: border-box; text-align: left;
            display: flex; flex-direction: column; justify-content: center;
            background: var(--jrk-dark); /* DARK THEME FOR FORM */
            color: #ffffff;
        }

        .modal-right h2 { color: var(--jrk-accent); font-size: 28px; font-weight: 900; margin: 0 0 10px 0; line-height: 1.1; }
        .modal-right p { font-size: 14px; color: #b0cbb0; line-height: 1.6; margin-bottom: 25px; }
        
        input { 
            width: 100%; padding: 16px; margin: 8px 0; border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 16px; box-sizing: border-box; background: rgba(255,255,255,0.05); 
            font-size: 16px; color: white; outline: none;
        }
        input::placeholder { color: #668366; }
        input:focus { border-color: var(--jrk-accent); background: rgba(255,255,255,0.1); }
        
        #submit-btn { 
            width: 100%; background: var(--jrk-green); color: white; border: none; 
            padding: 18px; border-radius: 16px; font-weight: 800; font-size: 16px; 
            margin-top: 15px; cursor: pointer; transition: 0.2s;
        }
        #submit-btn:hover { background: var(--jrk-accent); }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="simple.glb" ar ar-modes="webxr scene-viewer quick-look" 
                  camera-controls camera-orbit="auto auto 150%" 
                  environment-image="legacy" exposure="1.1" shadow-intensity="1.5">
        
        <div class="ui-panel">
            <div class="button-group">
                <button id="btn-simple" class="mode-btn active">SIMPLIFIED</button>
                <button id="btn-detail" class="mode-btn">DETAILED</button>
            </div>
            <button id="quiz-trigger">🎁 THE PAVILION CHALLENGE</button>
        </div>

        <div id="quiz-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="close-modal">&times;</span>
                
                <div class="modal-left">
                    <img src="prize.png" alt="JORAKAY Prize">
                </div>

                <div class="modal-right">
                    <h2>WIN THIS PRIZE!</h2>
                    <p>
                        Spot exactly how many modular pieces create the <b>JORAKAY EXPERT PAVILION</b>! Submit your closest guess now.
                        <br><br>
                        Closest <b>3</b> answers win limited edition 3D-printed modular models of <b>JORAKAY</b>!
                    </p>
                    <form id="quiz-form">
                        <input type="number" name="guess" placeholder="Your Guess (e.g. 142)" required>
                        <input type="text" name="name" placeholder="Full Name" required>
                        <input type="tel" name="phone" placeholder="Phone Number" required>
                        <input type="email" name="email" placeholder="Email Address" required>
                        <button type="submit" id="submit-btn">SUBMIT ENTRY</button>
                    </form>
                </div>
            </div>
        </div>
    </model-viewer>

    <script>
        const viewer = document.getElementById('viewer');
        const btnSimple = document.getElementById('btn-simple');
        const btnDetail = document.getElementById('btn-detail');
        const modal = document.getElementById('quiz-modal');

        function switchModel(mode) {
            btnSimple.classList.toggle('active', mode === 'simple');
            btnDetail.classList.toggle('active', mode === 'detail');
            const newSrc = mode === 'simple' ? 'simple.glb' : 'detail.glb';
            if (viewer.src !== newSrc) { viewer.src = newSrc; }
        }

        btnSimple.onclick = () => switchModel('simple');
        btnDetail.onclick = () => switchModel('detail');

        viewer.addEventListener('load', () => {
            viewer.model.materials.forEach(m => {
                m.pbrMetallicRoughness.setBaseColorFactor([1, 1, 1, 1]);
                m.pbrMetallicRoughness.setRoughnessFactor(0.4);
            });
        });

        // Modal Logic
        const closeLogic = () => { modal.style.display = 'none'; document.body.style.overflow = 'auto'; };
        document.getElementById('quiz-trigger').onclick = () => { modal.style.display = 'flex'; document.body.style.overflow = 'hidden'; };
        document.getElementById('close-modal').onclick = closeLogic;
        window.onclick = (e) => { if (e.target == modal) closeLogic(); }

        document.getElementById('quiz-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "SENDING...";
            const scriptURL = 'https://script.google.com/macros/s/AKfycbxQYJOzlaJfVQjO9BDEVli7gsEwxlc2BOU3SVloMzygtlwXfqSf1h6bQi6218ox5lSh/exec';
            try {
                await fetch(scriptURL, { method: 'POST', body: new FormData(e.target), mode: 'no-cors' });
                alert("Boom! Entry received. Good luck!");
                closeLogic();
                e.target.reset();
            } catch (err) { alert("Error."); }
            btn.innerText = "SUBMIT ENTRY";
        };
    </script>
</body>
</html>
